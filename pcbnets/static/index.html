<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>pcbnets viewer</title>
<style>
html,body{height:100%;margin:0;background:#111;color:#ddd;font:14px system-ui,sans-serif;overflow:hidden}#app{display:grid;grid-template-columns:1fr 280px;height:100%}#stage{position:relative;overflow:auto;background:#181818}.board{position:relative;margin:24px;transform-origin:0 0}.panel{position:absolute;background:#050505;box-shadow:0 0 0 1px #444}.panel.back{transform:scaleX(-1)}.art svg,.net svg{position:absolute;inset:0;width:100%;height:100%;display:block}.copper.outer svg{fill:#d9a441}.copper.inner svg{fill:#b7bcc5}.mask svg{fill:rgba(20,90,52,.72)}.silk svg{fill:#fff}.net{position:absolute;inset:0;z-index:10}.net-shape{fill:transparent;stroke:transparent;pointer-events:all}.net-shape.selected{fill:rgba(255,80,80,.7);stroke:rgba(255,80,80,.7);pointer-events:all}.label{position:absolute;left:4px;top:3px;color:#fff;background:#0009;padding:2px 5px;border-radius:3px;z-index:20;pointer-events:none}aside{border-left:1px solid #333;padding:16px;background:#202020;overflow:auto}button{margin:3px;padding:5px 8px;background:#333;color:#eee;border:1px solid #555;border-radius:3px}#error{color:#ff9d9d;white-space:pre-wrap}#net{font-weight:700;color:#ff8a8a}</style>
</head><body><div id="app"><main id="stage"><div id="board" class="board"></div></main><aside><h1>pcbnets viewer</h1><p><button id="front">Front</button><button id="back">Back</button><button id="zin">Zoom +</button><button id="zout">Zoom -</button><button id="clear">Clear</button></p><p>Selected net: <span id="net">none</span></p><div id="error"></div><h2>Layers</h2><div id="layers"></div></aside></div>
<script>
let meta, zoom=1, back=false, currentNet=null, netmapRoot=null;
const board=document.getElementById('board'), err=document.getElementById('error');
function fail(msg){err.textContent=msg;throw new Error(msg)}
async function text(path, what){const r=await fetch(path); if(!r.ok) fail(`${what} missing: ${path}`); return await r.text()}
function parseSvg(src,path){const doc=new DOMParser().parseFromString(src,'image/svg+xml'); const e=doc.querySelector('parsererror'); if(e) fail(`SVG cannot be parsed: ${path}`); const svg=doc.documentElement; if(!svg||svg.tagName.toLowerCase()!=='svg') fail(`SVG cannot be parsed: ${path}`); return document.importNode(svg,true)}
function checkSvg(svg,path,w,h){let vb=svg.getAttribute('viewBox'); if(vb){const p=vb.trim().split(/\s+/).map(Number); if(p.length===4&&(Math.abs(p[2]-w)>0.01||Math.abs(p[3]-h)>0.01)) fail(`SVG dimensions do not match metadata for ${path}: ${p[2]}x${p[3]} expected ${w}x${h}`)}}
function layerFile(name){return (meta.layer_svgs&&meta.layer_svgs[name])||`${name}.svg`}
function isOuter(n){return /^F_Cu$|^B_Cu$/.test(n)} function isBack(n){return /^B_|^bottom/i.test(n)}
async function addSvg(div,name,cls){const path=layerFile(name); const svg=parseSvg(await text(path,`SVG layer ${name}`),path); checkSvg(svg,path,meta.tile_w||meta.width||div.clientWidth,meta.tile_h||meta.height||div.clientHeight); const wrap=document.createElement('div'); wrap.className=`art ${cls||''}`; wrap.appendChild(svg); div.appendChild(wrap)}
async function init(){meta=JSON.parse(await text('meta.json','metadata')); if(!meta.netmap) meta.netmap='netmap.svg'; const placements=meta.placements||{}; const layers=meta.layers||Object.keys(placements); const bw=meta.grid_w||meta.width||Math.max(...Object.values(placements).map(p=>p.x+p.w)); const bh=meta.grid_h||meta.height||Math.max(...Object.values(placements).map(p=>p.y+p.h)); board.style.width=bw+'px'; board.style.height=bh+'px';
 for(const name of layers){const p=placements[name]; if(!p) continue; const panel=document.createElement('section'); panel.className='panel copper '+(isOuter(name)?'outer':'inner'); Object.assign(panel.style,{left:p.x+'px',top:p.y+'px',width:p.w+'px',height:p.h+'px'}); panel.dataset.layer=name; await addSvg(panel,name,'copper '+(isOuter(name)?'outer':'inner')); const lab=document.createElement('div'); lab.className='label'; lab.textContent=name; panel.appendChild(lab); board.appendChild(panel); document.getElementById('layers').insertAdjacentHTML('beforeend',`<div>${name}</div>`)}
 for(const name of [...(meta.mask_layers||[]),...(meta.silk_layers||[]),...(meta.drill_layers||[])]){if(!meta.layer_svgs||!meta.layer_svgs[name]) continue; const base=placements[layers[0]]||{x:0,y:0,w:meta.tile_w||meta.width,h:meta.tile_h||meta.height}; const panel=document.createElement('section'); panel.className='panel '+(name.includes('Silk')?'silk':'mask'); Object.assign(panel.style,{left:base.x+'px',top:base.y+'px',width:base.w+'px',height:base.h+'px',pointerEvents:'none'}); await addSvg(panel,name,name.includes('Silk')?'silk':'mask'); board.appendChild(panel)}
 const netWrap=document.createElement('div'); netWrap.className='net'; netWrap.innerHTML=await text(meta.netmap,'netmap.svg'); netmapRoot=netWrap.querySelector('svg'); if(!netmapRoot) fail('SVG cannot be parsed: netmap.svg'); checkSvg(netmapRoot,meta.netmap,bw,bh); board.appendChild(netWrap); validateNetmap(); netmapRoot.addEventListener('pointerdown',e=>{const s=e.target.closest('[data-net-id]'); if(s){selectNet(Number(s.dataset.netId)); e.stopPropagation();}else clearNet();}); board.addEventListener('pointerdown',e=>{if(!e.target.closest('[data-net-id]')) clearNet()}); applyView();}
function validateNetmap(){const max=Number(meta.n_nets||0); for(const e of netmapRoot.querySelectorAll('[data-net-id]')){const id=Number(e.dataset.netId); if(!Number.isInteger(id)||id<1||(max&&id>max)) fail(`Net-map geometry references an invalid net ID: ${e.dataset.netId}`); e.classList.add('net-shape');}}
function cssEsc(s){return window.CSS&&CSS.escape?CSS.escape(s):s.replace(/"/g,'\\"')}
function selectNet(id){netmapRoot.querySelectorAll('.net-shape.selected').forEach(e=>e.classList.remove('selected')); netmapRoot.querySelectorAll(`[data-net-id="${cssEsc(String(id))}"]`).forEach(e=>e.classList.add('selected')); currentNet=id; document.getElementById('net').textContent=id;}
function clearNet(){if(netmapRoot) netmapRoot.querySelectorAll('.selected').forEach(e=>e.classList.remove('selected')); currentNet=null; document.getElementById('net').textContent='none'}
function applyView(){board.style.transform=`scale(${zoom})`; board.classList.toggle('back',back); for(const p of board.querySelectorAll('.panel')) p.classList.toggle('back',back&&isBack(p.dataset.layer||''));}
document.getElementById('zin').onclick=()=>{zoom*=1.25;applyView()}; document.getElementById('zout').onclick=()=>{zoom/=1.25;applyView()}; document.getElementById('front').onclick=()=>{back=false;applyView()}; document.getElementById('back').onclick=()=>{back=true;applyView()}; document.getElementById('clear').onclick=clearNet;
init().catch(e=>{err.textContent=e.message});
</script></body></html>
