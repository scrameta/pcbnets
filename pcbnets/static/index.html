<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>pcbnets viewer</title>
<style>
  :root{
    --bg:#1a1a1a; --panel:#202020; --fg:#e0e0e0; --muted:#888;
    --substrate:#2b2416;          /* bare FR4 under the copper */
    --copper-outer:#c98f2e;
    --copper-inner:#b7bcc5;
    --soldermask:#0d6b34;
    --silk:#f2f2f2;
    --drill:#0b0b0b;
    --highlight:rgba(255,80,80,.75);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);
            font:14px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
  body{display:flex;flex-direction:row}

  aside{width:290px;flex-shrink:0;padding:16px;background:var(--panel);
        border-right:1px solid #333;overflow-y:auto}
  aside h1{font-size:16px;margin:0 0 12px}
  aside label.section{font-size:11px;color:var(--muted);text-transform:uppercase;
                      display:block;margin-top:16px;margin-bottom:6px}
  button{margin:0 4px 4px 0;padding:6px 10px;background:#333;color:var(--fg);
         border:1px solid #444;border-radius:3px;cursor:pointer;font:inherit;font-size:12px}
  button:hover{background:#444}
  button.active{background:#2a5a7a;border-color:#4ac}
  .row{display:flex;gap:4px;flex-wrap:wrap}

  /* A layer button carries a dot when the selected net has copper on it. */
  #layer-buttons button{position:relative;padding-left:20px}
  #layer-buttons button::before{
    content:'';position:absolute;left:7px;top:50%;transform:translateY(-50%);
    width:6px;height:6px;border-radius:50%;background:transparent;
    box-shadow:inset 0 0 0 1px #555}
  #layer-buttons button.has-net::before{background:var(--highlight);box-shadow:none}

  #net-info{margin-top:16px;font-size:13px}
  #net{font-weight:700;color:#ff8a8a}
  .layer-list{color:var(--muted);margin-top:4px;font-size:12px}
  #error{color:#ff9d9d;white-space:pre-wrap;margin-top:12px}

  main{flex:1;overflow:auto;position:relative;background:#141414;cursor:crosshair}
  main.dragging{cursor:move}

  /* The board is a physical stack: substrate, copper, soldermask, silkscreen.
     transform-origin stays at 0 0 so scroll offsets remain meaningful; the
     back view mirrors in place with translateX(-100%) rather than moving the
     board out from under the scroll container. */
  .board{position:relative;margin:24px;transform-origin:0 0;
         background:var(--substrate);box-shadow:0 0 0 1px #000}

  .layer{position:absolute;inset:0;pointer-events:none}
  .layer svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  .layer[hidden]{display:none}

  .copper.outer{color:var(--copper-outer)}
  .copper.inner{color:var(--copper-inner)}
  .soldermask{color:var(--soldermask);opacity:.82}
  .silk{color:var(--silk)}
  .drill{color:var(--drill)}

  .net{position:absolute;inset:0;z-index:20;pointer-events:none}
  .net svg{position:absolute;inset:0;width:100%;height:100%;display:block;pointer-events:none}
  .net g[data-layer]{display:none}
  .net g[data-layer].shown{display:inline;pointer-events:auto}
  .net-shape{fill:transparent;stroke:transparent;pointer-events:all}
  .net-shape.selected{fill:var(--highlight);stroke:var(--highlight)}
</style>
</head>
<body>

<aside>
  <h1>pcbnets viewer</h1>

  <label class="section">Layer</label>
  <div class="row" id="layer-buttons"></div>

  <label class="section">Board stack</label>
  <div class="row" id="stack-buttons"></div>

  <label class="section">View</label>
  <div class="row">
    <button id="front" class="active">Front</button>
    <button id="back">Back</button>
    <button id="zin">Zoom +</button>
    <button id="zout">Zoom -</button>
    <button id="fit">Fit</button>
  </div>

  <div id="net-info">
    Selected net: <span id="net">none</span>
    <div id="net-layers" class="layer-list"></div>
    <div class="row" style="margin-top:8px"><button id="clear">Clear</button></div>
  </div>

  <div id="error"></div>
</aside>

<main id="stage"><div id="board" class="board"></div></main>

<script>
'use strict';

const board = document.getElementById('board');
const stage = document.getElementById('stage');
const errEl = document.getElementById('error');

let meta, netRoot;
let zoom = 1, back = false;
let activeLayer = null, currentNet = null;

const copperEls = new Map();          // copper layer name -> element
const stackEls  = new Map();          // overlay name -> element
const stackOn   = {soldermask:true, silk:true, drill:true};

function fail(msg){ errEl.textContent = msg; throw new Error(msg); }

async function text(path, what){
  const r = await fetch(path);
  if(!r.ok) fail(`${what} missing: ${path}`);
  return r.text();
}

function parseSvg(src, path){
  const doc = new DOMParser().parseFromString(src, 'image/svg+xml');
  if(doc.querySelector('parsererror')) fail(`SVG cannot be parsed: ${path}`);
  const svg = doc.documentElement;
  if(!svg || svg.tagName.toLowerCase() !== 'svg') fail(`SVG cannot be parsed: ${path}`);
  return document.importNode(svg, true);
}

function checkSize(svg, path, w, h){
  const vb = svg.getAttribute('viewBox');
  if(!vb) return;
  const p = vb.trim().split(/[\s,]+/).map(Number);
  if(p.length === 4 && (Math.abs(p[2]-w) > 0.01 || Math.abs(p[3]-h) > 0.01))
    fail(`SVG dimensions do not match metadata for ${path}: ${p[2]}x${p[3]}, expected ${w}x${h}`);
}

/* Gerber soldermask layers describe the OPENINGS, not the coverage: on this
   board F_Mask is 13% fill and every shape sits over a pad or a drill. To draw
   a board we need the complement. The build step leaves each layer as a
   <mask> holding black backdrop + white artwork, painted through by one rect,
   so swapping those two luminances inverts the mask in place. */
function invertMask(svg){
  const mask = svg.querySelector('mask');
  if(!mask) return svg;
  for(const el of mask.querySelectorAll('*')){
    for(const attr of ['fill','stroke']){
      const v = (el.getAttribute(attr) || '').toUpperCase();
      if(v === '#010101') el.setAttribute(attr, '#FEFEFE');
      else if(v === '#FEFEFE') el.setAttribute(attr, '#010101');
    }
  }
  return svg;
}

const isOuter = n => (meta.outer_layers || ['F_Cu','B_Cu']).includes(n);
const sideOf  = n => /^B[_-]/i.test(n) ? 'B' : 'F';

async function addLayer(name, cls, w, h, {invert=false} = {}){
  const file = (meta.layer_svgs && meta.layer_svgs[name]) || `${name}.svg`;
  const svg = parseSvg(await text(file, `SVG layer ${name}`), file);
  checkSize(svg, file, w, h);
  if(invert) invertMask(svg);
  const div = document.createElement('div');
  div.className = `layer ${cls}`;
  div.dataset.layer = name;
  div.hidden = true;
  div.appendChild(svg);
  board.appendChild(div);
  return div;
}

async function init(){
  meta = JSON.parse(await text('meta.json', 'metadata'));
  if(!meta.netmap) meta.netmap = 'netmap.svg';

  const w = meta.width || meta.tile_w;
  const h = meta.height || meta.tile_h;
  if(!w || !h) fail('metadata is missing board dimensions (width/height)');
  board.style.width = w + 'px';
  board.style.height = h + 'px';

  const copper = meta.layers || [];
  if(!copper.length) fail('metadata lists no copper layers');

  // Copper sits directly on the substrate. Exactly one layer shows at a time.
  for(const name of copper) copperEls.set(name, await addLayer(name, 'copper ' + (isOuter(name)?'outer':'inner'), w, h));

  // Soldermask then silkscreen then drill, so the stack reads bottom-up the
  // way the physical board does. Drill holes punch through everything.
  const have = n => meta.layer_svgs && meta.layer_svgs[n];
  for(const name of (meta.mask_layers || []))
    if(have(name)) stackEls.set(name, await addLayer(name, 'soldermask', w, h, {invert:true}));
  for(const name of (meta.silk_layers || []))
    if(have(name)) stackEls.set(name, await addLayer(name, 'silk', w, h));
  for(const name of (meta.drill_layers || []))
    if(have(name)) stackEls.set(name, await addLayer(name, 'drill', w, h));

  const netWrap = document.createElement('div');
  netWrap.className = 'net';
  netWrap.appendChild(parseSvg(await text(meta.netmap, 'netmap.svg'), meta.netmap));
  netRoot = netWrap.querySelector('svg');
  // The pick map is emitted on a finer grid than the layers (meta.netmap_scale)
  // so the highlight follows trace edges instead of looking blocky. Its <svg>
  // stretches to the same board box, so the extra resolution costs nothing in
  // layout -- only the viewBox differs.
  const ns = Math.max(1, Number(meta.netmap_scale) || 1);
  const netW = Number(meta.netmap_width) || w * ns;
  const netH = Number(meta.netmap_height) || h * ns;
  checkSize(netRoot, meta.netmap, netW, netH);
  board.appendChild(netWrap);
  validateNetmap();

  buildLayerButtons(copper);
  buildStackButtons();

  netRoot.addEventListener('pointerdown', e => {
    const shape = e.target.closest('[data-net-id]');
    if(shape){ selectNet(Number(shape.dataset.netId)); e.stopPropagation(); }
    else clearNet();
  });
  stage.addEventListener('pointerdown', e => {
    if(!e.target.closest('[data-net-id]')) clearNet();
  });
  enablePan();

  selectLayer(copper[0]);
  fit();
}

function validateNetmap(){
  const max = Number(meta.n_nets || 0);
  for(const e of netRoot.querySelectorAll('[data-net-id]')){
    const id = Number(e.dataset.netId);
    if(!Number.isInteger(id) || id < 1 || (max && id > max))
      fail(`Net-map geometry references an invalid net ID: ${e.dataset.netId}`);
  }
}

function buildLayerButtons(copper){
  const box = document.getElementById('layer-buttons');
  for(const name of copper){
    const b = document.createElement('button');
    b.textContent = name;
    b.dataset.layer = name;
    b.onclick = () => selectLayer(name);
    box.appendChild(b);
  }
}

function buildStackButtons(){
  const box = document.getElementById('stack-buttons');
  const kinds = [['soldermask','Solder mask'], ['silk','Silkscreen'], ['drill','Drill']];
  for(const [kind, label] of kinds){
    if(![...stackEls.values()].some(el => el.classList.contains(kind))) continue;
    const b = document.createElement('button');
    b.textContent = label;
    b.classList.toggle('active', stackOn[kind]);
    b.onclick = () => {
      stackOn[kind] = !stackOn[kind];
      b.classList.toggle('active', stackOn[kind]);
      applyStack();
    };
    box.appendChild(b);
  }
  if(!box.children.length){ box.textContent = 'none'; box.style.color = 'var(--muted)'; }
}

/* Inner layers are buried: no mask, no silkscreen. Outer layers get the stack
   for their own side only, so viewing F_Cu never paints B_Silkscreen on top. */
function applyStack(){
  const outer = isOuter(activeLayer);
  const side = sideOf(activeLayer);
  for(const [name, el] of stackEls){
    const kind = el.classList.contains('soldermask') ? 'soldermask'
               : el.classList.contains('silk') ? 'silk' : 'drill';
    const sideOk = (kind === 'drill') || (outer && sideOf(name) === side);
    el.hidden = !(stackOn[kind] && sideOk);
  }
}

function selectLayer(name){
  activeLayer = name;
  for(const [n, el] of copperEls) el.hidden = (n !== name);
  for(const b of document.querySelectorAll('#layer-buttons button'))
    b.classList.toggle('active', b.dataset.layer === name);

  // Marks stay on every layer's geometry; only the visible layer is pickable.
  for(const g of netRoot.querySelectorAll('g[data-layer]'))
    g.classList.toggle('shown', g.dataset.layer === name);

  applyStack();
}

function cssEsc(s){ return (window.CSS && CSS.escape) ? CSS.escape(s) : s.replace(/"/g,'\\"'); }

function selectNet(id){
  netRoot.querySelectorAll('.net-shape.selected').forEach(e => e.classList.remove('selected'));
  const layers = new Set();
  for(const e of netRoot.querySelectorAll(`[data-net-id="${cssEsc(String(id))}"]`)){
    e.classList.add('selected');
    layers.add(e.closest('g[data-layer]').dataset.layer);
  }
  currentNet = id;
  document.getElementById('net').textContent = id;
  document.getElementById('net-layers').textContent = layers.size ? [...layers].join(', ') : '';
  for(const b of document.querySelectorAll('#layer-buttons button'))
    b.classList.toggle('has-net', layers.has(b.dataset.layer));
}

function clearNet(){
  if(!netRoot) return;
  netRoot.querySelectorAll('.selected').forEach(e => e.classList.remove('selected'));
  currentNet = null;
  document.getElementById('net').textContent = 'none';
  document.getElementById('net-layers').textContent = '';
  for(const b of document.querySelectorAll('#layer-buttons button')) b.classList.remove('has-net');
}

/* Back view mirrors the board about its own vertical centreline while keeping
   the transform origin at 0 0. scaleX(-1) alone would flip it about the left
   edge and push it to negative x, off the left of the scroll container; the
   trailing translateX(-100%) (applied first, transforms compose right-to-left)
   shifts it back so the mirrored board lands exactly where it started. */
function applyView(){
  board.style.transform = back
    ? `scale(${zoom}) scaleX(-1) translateX(-100%)`
    : `scale(${zoom})`;
  document.getElementById('front').classList.toggle('active', !back);
  document.getElementById('back').classList.toggle('active', back);
}

/* Flipping the board over shows you the other side, so move to the outer
   layer on that side unless the user is already looking at an inner layer
   (they are buried, and equally visible from either side). */
function setSide(wantBack){
  if(back === wantBack) return;
  back = wantBack;
  const copper = meta.layers || [];
  if(isOuter(activeLayer)){
    const target = copper.find(n => isOuter(n) && sideOf(n) === (back ? 'B' : 'F'));
    if(target) selectLayer(target);
  }
  applyView();
}

function fit(){
  const w = meta.width || meta.tile_w, h = meta.height || meta.tile_h;
  const pad = 56;
  zoom = Math.max(0.02, Math.min((stage.clientWidth - pad) / w,
                                 (stage.clientHeight - pad) / h));
  applyView();
  stage.scrollLeft = 0; stage.scrollTop = 0;
}

// Middle-drag, or click-drag on empty space, pans the scroll container.
function enablePan(){
  let panning = false, sx = 0, sy = 0, sl = 0, st = 0;
  stage.addEventListener('pointerdown', e => {
    if(e.button !== 1 && !(e.button === 0 && !e.target.closest('[data-net-id]'))) return;
    panning = true; sx = e.clientX; sy = e.clientY;
    sl = stage.scrollLeft; st = stage.scrollTop;
    stage.classList.add('dragging');
    stage.setPointerCapture(e.pointerId);
  });
  stage.addEventListener('pointermove', e => {
    if(!panning) return;
    stage.scrollLeft = sl - (e.clientX - sx);
    stage.scrollTop  = st - (e.clientY - sy);
  });
  const end = e => { panning = false; stage.classList.remove('dragging'); };
  stage.addEventListener('pointerup', end);
  stage.addEventListener('pointercancel', end);

  // Ctrl/⌘ + wheel zooms; plain wheel scrolls as usual.
  stage.addEventListener('wheel', e => {
    if(!e.ctrlKey && !e.metaKey) return;
    e.preventDefault();
    zoom *= e.deltaY < 0 ? 1.1 : 1/1.1;
    zoom = Math.min(40, Math.max(0.02, zoom));
    applyView();
  }, {passive:false});
}

document.getElementById('zin').onclick   = () => { zoom = Math.min(40, zoom*1.25); applyView(); };
document.getElementById('zout').onclick  = () => { zoom = Math.max(0.02, zoom/1.25); applyView(); };
document.getElementById('front').onclick = () => setSide(false);
document.getElementById('back').onclick  = () => setSide(true);
document.getElementById('fit').onclick   = fit;
document.getElementById('clear').onclick = clearNet;

init().catch(e => { errEl.textContent = e.message; });
</script>
</body>
</html>
